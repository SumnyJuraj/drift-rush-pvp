<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drift Rush PvP</title>
    <style>
        * {
    /* Zakáže označovanie textu na celom webe */
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;

    /* Zakáže modrý rámček/záblesk pri kliknutí na mobile */
    -webkit-tap-highlight-color: transparent;
    
    /* Zakáže kontextové menu (podržanie prsta na obrazovke) */
    -webkit-touch-callout: none;
}

body {
    margin: 0;
    overflow: hidden;
    background: #111;
    /* KĽÚČOVÉ: Zakáže všetky gestá prehliadača (zoom, scroll, double-tap) */
    touch-action: none; 
}

canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    object-fit: contain;
}
        body { margin: 0; background: #111; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; object-fit: contain; background: #222; }
    </style>
</head>
<body>
    <button id="mobileToggle" style="position:fixed; z-index:100; top:10px; right:10px;">Mobile Mode: OFF</button>
    <div id="left-zone" style="position:fixed; left:0; top:0; width:50%; height:100%; z-index:50; display:none;"></div>
    <div id="right-zone" style="position:fixed; right:0; top:0; width:50%; height:100%; z-index:50; display:none;"></div>

    <canvas id="gameCanvas"></canvas>

    <!-- 1. Socket.io musí byť PRVÝ -->
    <script src="/socket.io/socket.io.js"></script>
    
    <!-- 2. Potom spustíme našu hru ako modul -->
    <script type="module">
        console.log("HTML: Spúšťam modul game.js");
        import './game.js';
    </script>
</body>
</html>
