<head>
    <meta charset="UTF-8">
    <!-- Zabezpečí, že mobil nebude stránku zoomovať a písmo ostane čitateľné -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drift Rush PvP</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #111; 
            font-family: sans-serif;
            /* Zákaz skrolovania a gest na celom body pre mobilné prehliadače */
            touch-action: none; 
        }
        canvas { 
            display: block; 
            /* Responzívne škálovanie pri zachovaní pomeru strán */
            max-width: 100vw; 
            max-height: 100vh;
            width: 100%;
            height: auto;
            margin: auto;
            background: #222;
        }
        /* Štýly pre dotykové zóny - neviditeľné, ale funkčné */
        .touch-zone {
            position: absolute;
            bottom: 0;
            top: 0;
            width: 50%;
            z-index: 20;
            display: none; /* Zapne sa len v Mobile Mode */
        }
        #left-zone { left: 0; }
        #right-zone { right: 0; }
    </style>
</head>
<body>
    <div id="left-zone" class="touch-zone"></div>
    <div id="right-zone" class="touch-zone"></div>
    <!-- Zvyšok UI pre mobileToggle ostáva -->
</body>
